<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>老白TV IPTV播放列表</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #f4f4f9, #e2e2e9);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        h1 {
            color: #333333;
            font-size: 24px;
            text-align: center;
            margin-bottom: 20px;
        }
        .container {
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            background-color: #ffffff;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0px 6px 12px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
        }
        .option {
            flex: 1;
            margin: 0 20px;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 10px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .option h2 {
            font-size: 20px;
            margin-bottom: 10px;
        }
        .btn, .small-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 18px;
            color: #ffffff;
            text-decoration: none;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn {
            background-color: #28a745;
        }
        .small-btn {
            background-color: #007BFF;
        }
        .btn:hover {
            background-color: #218838;
        }
        .small-btn:hover {
            background-color: #0056b3;
        }
        .btn:active, .small-btn:active {
            transform: scale(0.98);
        }
        .message {
            margin-top: 10px;
            color: green;
            font-size: 16px;
        }
        .divider {
            width: 2px;
            background-color: #ddd;
            height: 200px;
            align-self: center;
        }
    </style>
</head>
<body>
    <h1>老白TV IPTV播放列表</h1>
    <div class="container">
        <!-- 北京联通 -->
        <div class="option">
            <h2>北京联通</h2>
            <button class="btn" id="copyBtnBeijing">点击复制播放列表链接</button>
            <a class="small-btn" href="/beijing/chinaunicom/q-beijing-unicom.m3u" download>下载播放列表</a>
            <p id="messageBeijing" class="message" style="display:none;">北京联通链接已复制到剪贴板！</p>
        </div>

        <!-- 分割线 -->
        <div class="divider"></div>

        <!-- 贵州电信 -->
        <div class="option">
            <h2>贵州电信</h2>
            <button class="btn" id="copyBtnGuizhou">点击复制播放列表链接</button>
            <a class="small-btn" href="/guizhou/chinatelecom/q-guiyang-telecom.m3u" download>下载播放列表</a>
            <p id="messageGuizhou" class="message" style="display:none;">贵州电信链接已复制到剪贴板！</p>
        </div>
    </div>

    <script>
        // 复制北京联通链接
        document.getElementById('copyBtnBeijing').addEventListener('click', function() {
            var copyText = '/beijing/chinaunicom/q-beijing-unicom.m3u';
            navigator.clipboard.writeText(window.location.origin + copyText)
            .then(function() {
                var message = document.getElementById('messageBeijing');
                message.style.display = 'block';
                setTimeout(function() {
                    message.style.display = 'none';
                }, 2000);
            })
            .catch(function(err) {
                console.error('复制失败:', err);
            });
        });

        // 复制贵州电信链接
        document.getElementById('copyBtnGuizhou').addEventListener('click', function() {
            var copyText = '/guizhou/chinatelecom/q-guiyang-telecom.m3u';
            navigator.clipboard.writeText(window.location.origin + copyText)
            .then(function() {
                var message = document.getElementById('messageGuizhou');
                message.style.display = 'block';
                setTimeout(function() {
                    message.style.display = 'none';
                }, 2000);
            })
            .catch(function(err) {
                console.error('复制失败:', err);
            });
        });
    </script>
</body>
</html>
