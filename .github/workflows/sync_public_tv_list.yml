name: Fetch and merge Public TV stream lists

on:
  schedule:
    - cron: '0 */6 * * *' # 每 6 小时运行一次
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  sync-files:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Download and merge remote M3U files into tv.m3u
      run: |
        TARGET_FILE='public/target.txt'
        if [ -f "$TARGET_FILE" ]; then
          # 清空旧文件并初始化 tv.m3u
          > public/tv.m3u
          while IFS= read -r url; do
            if [[ "$url" =~ ^https?:// ]]; then
              echo "Downloading $url"
              # 追加远程文件内容到 tv.m3u
              curl -L --fail "$url" >> public/tv.m3u || echo "Failed to download $url"
            fi
          done < "$TARGET_FILE"
        else
          echo "Error: target.txt not found"
          exit 1
        fi

    - name: Merge with local stream.m3u to create main.m3u
      run: |
        STREAM_FILE='stream/stream.m3u'
        OUTPUT_FILE='public/main.m3u'
        if [ -f "$STREAM_FILE" ]; then
          echo "Merging tv.m3u and stream.m3u"
          # 合并文件并去重（可选）
          cat public/tv.m3u "$STREAM_FILE" | sort -u > "$OUTPUT_FILE"
        else
          echo "Error: stream.m3u not found"
          exit 1
        fi

    - name: Commit and push changes
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "actions-bot@github.com"
        # 仅当 main.m3u 发生变化时提交
        if [ -n "$(git status --porcelain public/main.m3u)" ]; then
          git add public/main.m3u
          git commit -m "Auto-update: Merged stream lists at $(date +'%Y-%m-%d %H:%M')"
          git push
        else
          echo "No changes detected in main.m3u"
        fi
      if: success()
