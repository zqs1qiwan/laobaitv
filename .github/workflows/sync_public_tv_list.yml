name: fetch/merge public tv m3u

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  sync-files:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Build tv.m3u from remote sources
      run: |
        # 初始化带标准头的tv.m3u
        echo -e "#EXTM3U\n" > public/tv.m3u
        
        # 遍历target.txt中的URL
        while IFS= read -r url; do
          if [[ "$url" =~ ^https?:// ]]; then
            echo "正在获取：$url"
            # 直接追加远程内容（保留原始格式）
            curl -L --fail "$url" | 
              sed -e '/^#EXTM3U/d' -e '/^$/d' >> public/tv.m3u
            echo -e "\n" >> public/tv.m3u  # 添加换行分隔
          fi
        done < public/target.txt

    - name: Merge into main.m3u
      run: |
        # 保留tv.m3u完整内容
        cp public/tv.m3u public/main.m3u
        
        # 追加stream.m3u内容（保留原始格式）
        if [ -f stream/stream.m3u ]; then
          echo -e "\n" >> public/main.m3u  # 添加分隔空行
          sed -e '/^#EXTM3U/d' -e '/^$/d' stream/stream.m3u >> public/main.m3u
        fi

        # 确保文件末尾有空行
        echo >> public/main.m3u

    - name: Commit changes
      run: |
        git config user.name "Auto Updater"
        git config user.email "auto@updater.com"
        git add public/main.m3u
        if [ -n "$(git status --porcelain public/main.m3u)" ]; then
          git commit -m "自动合并播放列表 $(date +'%Y-%m-%d %H:%M')"
          git push
        fi
